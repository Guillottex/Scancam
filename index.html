
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Escáner de Documentos</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0e0f14">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Escáner">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --bg: #0e0f14;
    --surface: #1a1c24;
    --surface-2: #23252f;
    --surface-3: #2b2e3a;
    --paper: #f3efe6;
    --accent-1: #ffb454;
    --accent-2: #ff7a59;
    --accent-solid: #ffa24d;
    --ok: #45d3ab;
    --danger: #ff6b6b;
    --text: #f4f5f9;
    --text-muted: #888e9e;
    --text-faint: #565c6b;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --display: "Space Grotesk", var(--sans);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text); font-family:var(--sans);}
  body{
    min-height:100vh; padding-bottom: 140px;
    background-image: radial-gradient(circle at 15% 0%, rgba(255,140,80,.08), transparent 45%);
  }

  /* ---------- Top bar ---------- */
  .topbar{
    position: sticky; top:0; z-index:20;
    display:flex; align-items:center; justify-content:space-between;
    padding: 18px 18px 14px;
    background: linear-gradient(180deg, var(--bg) 70%, transparent);
    backdrop-filter: blur(10px);
  }
  .topbar-left{display:flex; align-items:center; gap:12px;}
  .logo-mark{
    width:38px; height:38px; border-radius:12px; flex-shrink:0;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 4px 14px rgba(255,130,70,.35);
  }
  .logo-mark svg{width:20px; height:20px;}
  .app-name{font-family: var(--display); font-weight:700; font-size:17px; letter-spacing:-0.01em;}
  .status-pill{
    display:inline-flex; align-items:center; gap:6px; margin-top:2px;
    font-size:11.5px; color: var(--text-muted); font-family: var(--mono);
  }
  .status-pill .dot{width:6px; height:6px; border-radius:50%; background: var(--accent-solid);
    box-shadow: 0 0 0 0 rgba(255,162,77,.6); animation: pulse 2.2s infinite;}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(255,162,77,.5);}
    70%{box-shadow:0 0 0 7px rgba(255,162,77,0);}
    100%{box-shadow:0 0 0 0 rgba(255,162,77,0);}
  }
  .icon-btn{
    width:38px; height:38px; border-radius:50%; background: var(--surface);
    border:1px solid var(--surface-3); color: var(--text-muted); display:flex;
    align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;
  }
  .icon-btn svg{width:17px; height:17px;}
  .icon-btn:active{transform: scale(.9);}

  main{padding: 4px 16px 16px;}

  /* ---------- Empty state ---------- */
  .empty-state{
    margin-top: 34px; text-align:center; padding: 36px 26px;
    border: 1.5px dashed var(--surface-3); border-radius: 20px; color: var(--text-muted);
  }
  .empty-state svg{width:46px; height:46px; opacity:.55; margin-bottom:6px;}
  .empty-state p{margin:8px 0 0; font-size:13.5px; line-height:1.55;}
  .empty-state b{color:var(--text); font-weight:600;}

  /* ---------- Grid / cards ---------- */
  .grid{display:grid; grid-template-columns: 1fr 1fr; gap: 13px;}
  .page-card{
    background: var(--surface); border-radius: 18px; overflow:hidden;
    border: 1px solid var(--surface-3);
    box-shadow: 0 10px 24px -12px rgba(0,0,0,.55);
    animation: cardIn .35s cubic-bezier(.2,.8,.3,1) backwards;
  }
  @keyframes cardIn{ from{opacity:0; transform: translateY(10px) scale(.97);} to{opacity:1; transform:none;} }
  .thumb-wrap{aspect-ratio: 3/4; background: var(--paper); position:relative; overflow:hidden;}
  .thumb-wrap img{width:100%; height:100%; object-fit:cover; display:block;}
  .thumb-scrim{
    position:absolute; left:0; right:0; bottom:0; height:46%;
    background: linear-gradient(180deg, transparent, rgba(10,10,12,.72));
    pointer-events:none;
  }
  .page-num{
    position:absolute; top:8px; left:8px; background: rgba(14,15,20,.6); backdrop-filter: blur(4px);
    color: var(--text); font-family: var(--mono); font-size:10.5px; font-weight:600;
    padding: 3px 8px; border-radius: 20px;
  }
  .del-btn{
    position:absolute; top:8px; right:8px; width:24px; height:24px; border-radius:50%;
    background: rgba(14,15,20,.6); backdrop-filter: blur(4px); color: var(--text); border:none;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .del-btn svg{width:11px; height:11px;}
  .card-footer{
    position:absolute; left:0; right:0; bottom:0; padding: 8px 9px;
    display:flex; align-items:center; justify-content:space-between; z-index:2;
  }
  .filter-chip{
    background: rgba(255,255,255,.12); backdrop-filter: blur(4px); padding:3px 9px; border-radius:20px;
    font-size:10px; font-weight:600; color:#fff; font-family: var(--sans); letter-spacing:.01em;
  }
  .move-btns{display:flex; gap:2px;}
  .move-btns button{
    background: rgba(14,15,20,.55); border:none; color: #fff; font-size:11px; cursor:pointer;
    padding: 4px 6px; border-radius:8px; display:flex; align-items:center;
  }
  .move-btns button svg{width:11px; height:11px;}
  .move-btns button:disabled{opacity:.25;}

  .scan-sweep{
    position:absolute; inset:0; pointer-events:none; z-index:3;
    background: linear-gradient(180deg, transparent 0%, rgba(255,178,84,.4) 45%, rgba(255,178,84,.9) 50%, rgba(255,178,84,.4) 55%, transparent 100%);
    transform: translateY(-100%);
    animation: sweep 1.05s cubic-bezier(.4,0,.2,1);
  }
  @keyframes sweep{ 0%{transform: translateY(-100%);} 100%{transform: translateY(100%);} }

  /* ---------- Dock ---------- */
  .dock-wrap{
    position: fixed; left:0; right:0; bottom:0; z-index:30;
    display:flex; justify-content:center;
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
  }
  .dock{
    display:flex; align-items:center; gap:26px;
    background: rgba(26,28,36,.82); backdrop-filter: blur(16px);
    border: 1px solid var(--surface-3); border-radius: 999px;
    padding: 10px 22px; box-shadow: 0 14px 34px -10px rgba(0,0,0,.6);
  }
  .dock-btn{
    background:none; border:none; color: var(--text-muted); display:flex; flex-direction:column;
    align-items:center; gap:3px; font-size:10.5px; font-family:var(--sans); font-weight:600;
    cursor:pointer; position:relative; padding: 4px 2px;
  }
  .dock-btn svg{width:21px; height:21px;}
  .dock-btn:active{transform: scale(.9);}
  .dock-badge{
    position:absolute; top:-4px; right:-8px; background: var(--accent-solid); color:#1a1000;
    font-size:9.5px; font-weight:700; min-width:16px; height:16px; border-radius:9px;
    display:flex; align-items:center; justify-content:center; padding:0 3px;
  }
  .fab{
    width:60px; height:60px; border-radius:50%; border:none; flex-shrink:0;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    box-shadow: 0 10px 26px -6px rgba(255,130,70,.55), 0 0 0 5px rgba(26,28,36,.82);
    transform: translateY(-4px);
    transition: transform .15s ease;
  }
  .fab svg{width:25px; height:25px; color:#1a1000;}
  .fab:active{transform: translateY(-4px) scale(.88);}

  /* ---------- Sheets ---------- */
  .sheet-backdrop{
    position:fixed; inset:0; background: rgba(6,7,10,.72); z-index:50;
    display:flex; align-items:flex-end; justify-content:center;
    animation: fadeIn .18s ease;
  }
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
  .sheet{
    background: var(--surface); width:100%; max-width:480px; border-radius: 26px 26px 0 0;
    padding: 10px 20px calc(20px + env(safe-area-inset-bottom)); max-height:88vh; overflow-y:auto;
    animation: slideUp .28s cubic-bezier(.2,.8,.3,1);
  }
  @keyframes slideUp{ from{transform: translateY(24px); opacity:.6;} to{transform:none; opacity:1;} }
  .sheet-handle{width:36px; height:4px; border-radius:3px; background: var(--surface-3); margin: 4px auto 10px;}
  .sheet h3{margin:0 0 4px; font-family: var(--display); font-size:17px; font-weight:600;}
  .sheet .sub{font-size:12.5px; color:var(--text-muted); margin:0 0 16px; line-height:1.5;}
  .sheet img{width:100%; border-radius:14px; background:var(--paper); margin-bottom:14px;}

  .filter-options{display:flex; gap:8px; margin-bottom:10px;}
  .filter-options button{
    flex:1; padding:11px 4px; border-radius:12px; border:1px solid var(--surface-3); background: var(--surface-2);
    color: var(--text); font-size:12px; cursor:pointer; font-family:var(--sans); font-weight:500;
  }
  .filter-options button.active{
    border-color: transparent; color:#1a1000;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); font-weight:700;
  }

  .segmented{display:flex; background:var(--surface-2); border-radius:14px; padding:4px; border:1px solid var(--surface-3);}
  .segmented button{
    flex:1; border:none; background:none; color:var(--text-muted); font-size:12.5px; font-weight:600;
    padding:9px 4px; border-radius:10px; cursor:pointer; font-family:var(--sans);
  }
  .segmented button.active{background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); color:#1a1000;}

  .sheet-row{margin-bottom:20px;}
  .sheet-row-label{font-size:11.5px; color: var(--text-muted); font-family:var(--mono); margin-bottom:8px; text-transform:uppercase; letter-spacing:.06em;}

  .btn-block{
    width:100%; padding:14px; border-radius:14px; border:none; font-family: var(--sans);
    font-weight:700; font-size:14px; cursor:pointer; margin-bottom:10px;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .btn-block svg{width:17px; height:17px;}
  .btn-primary{background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); color:#1a1000;}
  .btn-ok{background: var(--ok); color:#04241b;}
  .btn-ghost{background: var(--surface-2); color: var(--text); border:1px solid var(--surface-3) !important;}
  .btn-danger{background: rgba(255,107,107,.12); color: var(--danger); border:1px solid rgba(255,107,107,.3) !important;}
  .btn-block:active{transform: scale(.98);}
  .btn-block:disabled{opacity:.4; pointer-events:none;}

  /* ---------- Crop stage (4 vértices independientes) ---------- */
  .crop-stage-wrap{display:flex; justify-content:center; margin-bottom:8px;}
  .crop-stage{position:relative; display:inline-block; max-width:100%; touch-action:none; background:#000; border-radius:14px;}
  .crop-stage img{display:block; max-width:100%; max-height:54vh; width:auto; height:auto; border-radius:14px; user-select:none; -webkit-user-drag:none; pointer-events:none;}
  .quad-svg{position:absolute; inset:0; width:100%; height:100%; overflow:visible; pointer-events:none;}
  .quad-svg polygon{fill:rgba(255,178,84,.16); stroke:var(--accent-solid); stroke-width:2; pointer-events:auto; cursor:move; touch-action:none;}
  .quad-handle{
    position:absolute; width:48px; height:48px;
    transform:translate(-50%,-50%); touch-action:none; z-index:2;
    display:flex; align-items:center; justify-content:center;
  }
  .quad-handle::after{
    content:''; width:22px; height:22px; border-radius:50%; background: var(--accent-solid);
    box-shadow:0 0 0 4px rgba(14,15,20,.9);
  }
  .crop-hint{font-size:11.5px; color:var(--text-muted); text-align:center; margin:-2px 0 12px;}

  /* ---------- Toast ---------- */
  .toast{
    position:fixed; bottom:126px; left:50%; transform:translateX(-50%);
    background: var(--surface-2); color:var(--text); padding: 11px 18px; border-radius: 14px;
    font-size:13px; font-weight:500; z-index:60; border:1px solid var(--surface-3); max-width:88%;
    text-align:center; box-shadow: 0 10px 26px -8px rgba(0,0,0,.6);
    animation: toastIn .22s cubic-bezier(.2,.8,.3,1);
  }
  @keyframes toastIn{ from{opacity:0; transform: translateX(-50%) translateY(8px);} to{opacity:1; transform:translateX(-50%);} }

  input[type=file]{display:none;}
</style>
</head>

<script>
// ---------- Almacenamiento propio (IndexedDB) ----------
// Reemplaza el almacenamiento que ofrece Claude.ai dentro del chat por uno
// que funciona en cualquier navegador, para que la PWA sea independiente.
// Mismo "contrato" que se usa más abajo: get/set/delete(key, shared) y list(prefix, shared).
// El parámetro "shared" se ignora: acá todo es local al dispositivo.
(function () {
  const DB_NAME = 'escaner-documentos-db';
  const STORE = 'kv';
  let dbPromise = null;

  function openDb() {
    if (dbPromise) return dbPromise;
    dbPromise = new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = () => { req.result.createObjectStore(STORE); };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
    return dbPromise;
  }
  async function get(key) {
    const db = await openDb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).get(key);
      req.onsuccess = () => resolve(req.result === undefined ? null : { key, value: req.result, shared: false });
      req.onerror = () => reject(req.error);
    });
  }
  async function set(key, value) {
    const db = await openDb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).put(value, key);
      tx.oncomplete = () => resolve({ key, value, shared: false });
      tx.onerror = () => reject(tx.error);
    });
  }
  async function del(key) {
    const db = await openDb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).delete(key);
      tx.oncomplete = () => resolve({ key, deleted: true, shared: false });
      tx.onerror = () => reject(tx.error);
    });
  }
  async function list(prefix) {
    const db = await openDb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).getAllKeys();
      req.onsuccess = () => {
        let keys = req.result;
        if (prefix) keys = keys.filter((k) => String(k).startsWith(prefix));
        resolve({ keys, prefix, shared: false });
      };
      req.onerror = () => reject(req.error);
    });
  }
  window.storage = { get, set, delete: del, list };
})();

// ---------- Registro del service worker (para instalar y funcionar offline) ----------
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => { /* no bloquea la app si falla */ });
  });
}
</script>
<script>
const { jsPDF } = window.jspdf;

let sessionMeta = { createdAt: null, pageOrder: [] };
let pagesById = {};
let settings = { defaultFilter: 'bw' };

const $ = (id) => document.getElementById(id);
const grid = $('pageGrid');
const emptyState = $('emptyState');
const statusText = $('statusText');
const pageBadge = $('pageBadge');

const ICONS = {
  trash: '<svg viewBox="0 0 24 24" fill="none"><path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m-9 0 1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>',
  share: '<svg viewBox="0 0 24 24" fill="none"><path d="M12 15V4m0 0 4 4m-4-4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 13v6a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>',
  download: '<svg viewBox="0 0 24 24" fill="none"><path d="M12 4v11m0 0 4-4m-4 4-4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 18h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>',
  close: '<svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6 6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>',

  down: '<svg viewBox="0 0 24 24" fill="none"><path d="M6 10l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>'
};

function showToast(msg){
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=> t.remove(), 2600);
}

// ---------- Generic bottom sheet ----------
function op
