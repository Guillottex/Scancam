<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Escáner de Documentos</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0e0f14">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Escáner">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --bg: #0e0f14;
    --surface: #1a1c24;
    --surface-2: #23252f;
    --surface-3: #2b2e3a;
    --paper: #f3efe6;
    --accent-1: #ffb454;
    --accent-2: #ff7a59;
    --accent-solid: #ffa24d;
    --ok: #45d3ab;
    --danger: #ff6b6b;
    --text: #f4f5f9;
    --text-muted: #888e9e;
    --text-faint: #565c6b;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --display: "Space Grotesk", var(--sans);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text); font-family:var(--sans);}
  body{
    min-height:100vh; padding-bottom: 140px;
    background-image: radial-gradient(circle at 15% 0%, rgba(255,140,80,.08), transparent 45%);
  }

  /* ---------- Top bar ---------- */
  .topbar{
    position: sticky; top:0; z-index:20;
    display:flex; align-items:center; justify-content:space-between;
    padding: 18px 18px 14px;
    background: linear-gradient(180deg, var(--bg) 70%, transparent);
    backdrop-filter: blur(10px);
  }
  .topbar-left{display:flex; align-items:center; gap:12px;}
  .logo-mark{
    width:38px; height:38px; border-radius:12px; flex-shrink:0;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 4px 14px rgba(255,130,70,.35);
  }
  .logo-mark svg{width:20px; height:20px;}
  .app-name{font-family: var(--display); font-weight:700; font-size:17px; letter-spacing:-0.01em;}
  .status-pill{
    display:inline-flex; align-items:center; gap:6px; margin-top:2px;
    font-size:11.5px; color: var(--text-muted); font-family: var(--mono);
  }
  .status-pill .dot{width:6px; height:6px; border-radius:50%; background: var(--accent-solid);
    box-shadow: 0 0 0 0 rgba(255,162,77,.6); animation: pulse 2.2s infinite;}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(255,162,77,.5);}
    70%{box-shadow:0 0 0 7px rgba(255,162,77,0);}
    100%{box-shadow:0 0 0 0 rgba(255,162,77,0);}
  }
  .icon-btn{
    width:38px; height:38px; border-radius:50%; background: var(--surface);
    border:1px solid var(--surface-3); color: var(--text-muted); display:flex;
    align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;
  }
  .icon-btn svg{width:17px; height:17px;}
  .icon-btn:active{transform: scale(.9);}

  main{padding: 4px 16px 16px;}

  /* ---------- Empty state ---------- */
  .empty-state{
    margin-top: 34px; text-align:center; padding: 36px 26px;
    border: 1.5px dashed var(--surface-3); border-radius: 20px; color: var(--text-muted);
  }
  .empty-state svg{width:46px; height:46px; opacity:.55; margin-bottom:6px;}
  .empty-state p{margin:8px 0 0; font-size:13.5px; line-height:1.55;}
  .empty-state b{color:var(--text); font-weight:600;}

  /* ---------- Grid / cards ---------- */
  .grid{display:grid; grid-template-columns: 1fr 1fr; gap: 13px;}
  .page-card{
    background: var(--surface); border-radius: 18px; overflow:hidden;
    border: 1px solid var(--surface-3);
    box-shadow: 0 10px 24px -12px rgba(0,0,0,.55);
    animation: cardIn .35s cubic-bezier(.2,.8,.3,1) backwards;
  }
  @keyframes cardIn{ from{opacity:0; transform: translateY(10px) scale(.97);} to{opacity:1; transform:none;} }
  .thumb-wrap{aspect-ratio: 3/4; background: var(--paper); position:relative; overflow:hidden;}
  .thumb-wrap img{width:100%; height:100%; object-fit:cover; display:block;}
  .thumb-scrim{
    position:absolute; left:0; right:0; bottom:0; height:46%;
    background: linear-gradient(180deg, transparent, rgba(10,10,12,.72));
    pointer-events:none;
  }
  .page-num{
    position:absolute; top:8px; left:8px; background: rgba(14,15,20,.6); backdrop-filter: blur(4px);
    color: var(--text); font-family: var(--mono); font-size:10.5px; font-weight:600;
    padding: 3px 8px; border-radius: 20px;
  }
  .del-btn{
    position:absolute; top:8px; right:8px; width:24px; height:24px; border-radius:50%;
    background: rgba(14,15,20,.6); backdrop-filter: blur(4px); color: var(--text); border:none;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .del-btn svg{width:11px; height:11px;}
  .card-footer{
    position:absolute; left:0; right:0; bottom:0; padding: 8px 9px;
    display:flex; align-items:center; justify-content:space-between; z-index:2;
  }
  .filter-chip{
    background: rgba(255,255,255,.12); backdrop-filter: blur(4px); padding:3px 9px; border-radius:20px;
    font-size:10px; font-weight:600; color:#fff; font-family: var(--sans); letter-spacing:.01em;
  }
  .move-btns{display:flex; gap:2px;}
  .move-btns button{
    background: rgba(14,15,20,.55); border:none; color: #fff; font-size:11px; cursor:pointer;
    padding: 4px 6px; border-radius:8px; display:flex; align-items:center;
  }
  .move-btns button svg{width:11px; height:11px;}
  .move-btns button:disabled{opacity:.25;}

  .scan-sweep{
    position:absolute; inset:0; pointer-events:none; z-index:3;
    background: linear-gradient(180deg, transparent 0%, rgba(255,178,84,.4) 45%, rgba(255,178,84,.9) 50%, rgba(255,178,84,.4) 55%, transparent 100%);
    transform: translateY(-100%);
    animation: sweep 1.05s cubic-bezier(.4,0,.2,1);
  }
  @keyframes sweep{ 0%{transform: translateY(-100%);} 100%{transform: translateY(100%);} }

  /* ---------- Dock ---------- */
  .dock-wrap{
    position: fixed; left:0; right:0; bottom:0; z-index:30;
    display:flex; justify-content:center;
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
  }
  .dock{
    display:flex; align-items:center; gap:26px;
    background: rgba(26,28,36,.82); backdrop-filter: blur(16px);
    border: 1px solid var(--surface-3); border-radius: 999px;
    padding: 10px 22px; box-shadow: 0 14px 34px -10px rgba(0,0,0,.6);
  }
  .dock-btn{
    background:none; border:none; color: var(--text-muted); display:flex; flex-direction:column;
    align-items:center; gap:3px; font-size:10.5px; font-family:var(--sans); font-weight:600;
    cursor:pointer; position:relative; padding: 4px 2px;
  }
  .dock-btn svg{width:21px; height:21px;}
  .dock-btn:active{transform: scale(.9);}
  .dock-badge{
    position:absolute; top:-4px; right:-8px; background: var(--accent-solid); color:#1a1000;
    font-size:9.5px; font-weight:700; min-width:16px; height:16px; border-radius:9px;
    display:flex; align-items:center; justify-content:center; padding:0 3px;
  }
  .fab{
    width:60px; height:60px; border-radius:50%; border:none; flex-shrink:0;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    box-shadow: 0 10px 26px -6px rgba(255,130,70,.55), 0 0 0 5px rgba(26,28,36,.82);
    transform: translateY(-4px);
    transition: transform .15s ease;
  }
  .fab svg{width:25px; height:25px; color:#1a1000;}
  .fab:active{transform: translateY(-4px) scale(.88);}

  /* ---------- Sheets ---------- */
  .sheet-backdrop{
    position:fixed; inset:0; background: rgba(6,7,10,.72); z-index:50;
    display:flex; align-items:flex-end; justify-content:center;
    animation: fadeIn .18s ease;
  }
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
  .sheet{
    background: var(--surface); width:100%; max-width:480px; border-radius: 26px 26px 0 0;
    padding: 10px 20px calc(20px + env(safe-area-inset-bottom)); max-height:88vh; overflow-y:auto;
    animation: slideUp .28s cubic-bezier(.2,.8,.3,1);
  }
  @keyframes slideUp{ from{transform: translateY(24px); opacity:.6;} to{transform:none; opacity:1;} }
  .sheet-handle{width:36px; height:4px; border-radius:3px; background: var(--surface-3); margin: 6px auto 16px;}
  .sheet h3{margin:0 0 4px; font-family: var(--display); font-size:17px; font-weight:600;}
  .sheet .sub{font-size:12.5px; color:var(--text-muted); margin:0 0 16px; line-height:1.5;}
  .sheet img{width:100%; border-radius:14px; background:var(--paper); margin-bottom:14px;}

  .filter-options{display:flex; gap:8px; margin-bottom:16px;}
  .filter-options button{
    flex:1; padding:11px 4px; border-radius:12px; border:1px solid var(--surface-3); background: var(--surface-2);
    color: var(--text); font-size:12px; cursor:pointer; font-family:var(--sans); font-weight:500;
  }
  .filter-options button.active{
    border-color: transparent; color:#1a1000;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); font-weight:700;
  }

  .segmented{display:flex; background:var(--surface-2); border-radius:14px; padding:4px; border:1px solid var(--surface-3);}
  .segmented button{
    flex:1; border:none; background:none; color:var(--text-muted); font-size:12.5px; font-weight:600;
    padding:9px 4px; border-radius:10px; cursor:pointer; font-family:var(--sans);
  }
  .segmented button.active{background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); color:#1a1000;}

  .sheet-row{margin-bottom:20px;}
  .sheet-row-label{font-size:11.5px; color: var(--text-muted); font-family:var(--mono); margin-bottom:8px; text-transform:uppercase; letter-spacing:.06em;}

  .btn-block{
    width:100%; padding:14px; border-radius:14px; border:none; font-family: var(--sans);
    font-weight:700; font-size:14px; cursor:pointer; margin-bottom:10px;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .btn-block svg{width:17px; height:17px;}
  .btn-primary{background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); color:#1a1000;}
  .btn-ok{background: var(--ok); color:#04241b;}
  .btn-ghost{background: var(--surface-2); color: var(--text); border:1px solid var(--surface-3) !important;}
  .btn-danger{background: rgba(255,107,107,.12); color: var(--danger); border:1px solid rgba(255,107,107,.3) !important;}
  .btn-block:active{transform: scale(.98);}
  .btn-block:disabled{opacity:.4; pointer-events:none;}

  /* ---------- Crop stage (4 vértices independientes) ---------- */
  .crop-stage{position:relative; width:100%; margin-bottom:12px; touch-action:none; background:#000; border-radius:14px;}
  .crop-stage img{display:block; width:100%; height:auto; border-radius:14px; user-select:none; -webkit-user-drag:none; pointer-events:none;}
  .quad-svg{position:absolute; inset:0; width:100%; height:100%; overflow:visible; pointer-events:none;}
  .quad-svg polygon{fill:rgba(255,178,84,.16); stroke:var(--accent-solid); stroke-width:2; pointer-events:auto; cursor:move;}
  .quad-handle{
    position:absolute; width:26px; height:26px; border-radius:50%; background: var(--accent-solid);
    box-shadow:0 0 0 4px rgba(14,15,20,.9); transform:translate(-50%,-50%); touch-action:none; z-index:2;
  }
  .crop-hint{font-size:11.5px; color:var(--text-muted); text-align:center; margin:-2px 0 12px;}

  /* ---------- Toast ---------- */
  .toast{
    position:fixed; bottom:126px; left:50%; transform:translateX(-50%);
    background: var(--surface-2); color:var(--text); padding: 11px 18px; border-radius: 14px;
    font-size:13px; font-weight:500; z-index:60; border:1px solid var(--surface-3); max-width:88%;
    text-align:center; box-shadow: 0 10px 26px -8px rgba(0,0,0,.6);
    animation: toastIn .22s cubic-bezier(.2,.8,.3,1);
  }
  @keyframes toastIn{ from{opacity:0; transform: translateX(-50%) translateY(8px);} to{opacity:1; transform:translateX(-50%);} }

  input[type=file]{display:none;}
</style>
</head>

<script>
// ---------- Almacenamiento propio (IndexedDB) ----------
// Reemplaza el almacenamiento que ofrece Claude.ai dentro del chat por uno
// que funciona en cualquier navegador, para que la PWA sea independiente.
// Mismo "contrato" que se usa más abajo: get/set/delete(key, shared) y list(prefix, shared).
// El parámetro "shared" se ignora: acá todo es local al dispositivo.
(function () {
  const DB_NAME = 'escaner-documentos-db';
  const STORE = 'kv';
  let dbPromise = null;

  function openDb() {
    if (dbPromise) return dbPromise;
    dbPromise = new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = () => { req.result.createObjectStore(STORE); };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
    return dbPromise;
  }
  async function get(key) {
    const db = await openDb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).get(key);
      req.onsuccess = () => resolve(req.result === undefined ? null : { key, value: req.result, shared: false });
      req.onerror = () => reject(req.error);
    });
  }
  async function set(key, value) {
    const db = await openDb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).put(value, key);
      tx.oncomplete = () => resolve({ key, value, shared: false });
      tx.onerror = () => reject(tx.error);
    });
  }
  async function del(key) {
    const db = await openDb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).delete(key);
      tx.oncomplete = () => resolve({ key, deleted: true, shared: false });
      tx.onerror = () => reject(tx.error);
    });
  }
  async function list(prefix) {
    const db = await openDb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).getAllKeys();
      req.onsuccess = () => {
        let keys = req.result;
        if (prefix) keys = keys.filter((k) => String(k).startsWith(prefix));
        resolve({ keys, prefix, shared: false });
      };
      req.onerror = () => reject(req.error);
    });
  }
  window.storage = { get, set, delete: del, list };
})();

// ---------- Registro del service worker (para instalar y funcionar offline) ----------
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => { /* no bloquea la app si falla */ });
  });
}
</script>
<script>
const { jsPDF } = window.jspdf;

let sessionMeta = { createdAt: null, pageOrder: [] };
let pagesById = {};
let settings = { defaultFilter: 'bw' };

const $ = (id) => document.getElementById(id);
const grid = $('pageGrid');
const emptyState = $('emptyState');
const statusText = $('statusText');
const pageBadge = $('pageBadge');

const ICONS = {
  trash: '<svg viewBox="0 0 24 24" fill="none"><path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m-9 0 1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>',
  share: '<svg viewBox="0 0 24 24" fill="none"><path d="M12 15V4m0 0 4 4m-4-4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 13v6a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>',
  download: '<svg viewBox="0 0 24 24" fill="none"><path d="M12 4v11m0 0 4-4m-4 4-4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 18h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>',
  close: '<svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6 6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>',
  up: '<svg viewBox="0 0 24 24" fill="none"><path d="M6 14l6-6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  down: '<svg viewBox="0 0 24 24" fill="none"><path d="M6 10l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>'
};

function showToast(msg){
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=> t.remove(), 2600);
}

// ---------- Generic bottom sheet ----------
function openSheet(innerHtml){
  return new Promise((resolve)=>{
    const backdrop = document.createElement('div');
    backdrop.className = 'sheet-backdrop';
    backdrop.innerHTML = `<div class="sheet"><div class="sheet-handle"></div>${innerHtml}</div>`;
    document.body.appendChild(backdrop);
    function close(result){ backdrop.remove(); resolve(result); }
    backdrop.addEventListener('click', (e)=>{ if(e.target === backdrop) close(null); });
    resolve.close = close;
    backdrop._close = close;
    backdrop._sheet = backdrop.querySelector('.sheet');
    window.__lastSheet = backdrop;
  });
}
function closeSheet(){ if(window.__lastSheet) window.__lastSheet._close(null); }

// ---------- Storage helpers ----------
async function loadSettings(){
  try{
    const res = await window.storage.get('app-settings', false);
    if(res && res.value) settings = JSON.parse(res.value);
  }catch(e){ /* keep defaults */ }
}
async function saveSettings(){
  try{ await window.storage.set('app-settings', JSON.stringify(settings), false); }catch(e){ /* ignore */ }
}

async function loadSession(){
  try{
    const meta = await window.storage.get('session-meta', false);
    if(meta && meta.value) sessionMeta = JSON.parse(meta.value);
  }catch(e){ sessionMeta = { createdAt: null, pageOrder: [] }; }

  pagesById = {};
  for(const id of sessionMeta.pageOrder){
    try{
      const res = await window.storage.get(`page:${id}`, false);
      if(res && res.value) pagesById[id] = JSON.parse(res.value);
    }catch(e){ /* missing */ }
  }
  sessionMeta.pageOrder = sessionMeta.pageOrder.filter(id => pagesById[id]);
  render();
}
async function saveMeta(){
  try{ await window.storage.set('session-meta', JSON.stringify(sessionMeta), false); }
  catch(e){ showToast('No se pudo guardar la sesión.'); }
}
async function savePage(page){
  try{ await window.storage.set(`page:${page.id}`, JSON.stringify(page), false); }
  catch(e){ showToast('No se pudo guardar la página.'); }
}
async function deletePageStorage(id){
  try{ await window.storage.delete(`page:${id}`, false); }catch(e){ /* ignore */ }
}

// ---------- Image processing ----------
function fileToImage(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function resizeToDataUrl(img, maxDim=1600){
  const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
  const w = Math.round(img.width * scale);
  const h = Math.round(img.height * scale);
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  canvas.getContext('2d').drawImage(img, 0, 0, w, h);
  return canvas.toDataURL('image/jpeg', 0.82);
}
function loadImg(src){
  return new Promise((resolve)=>{ const im = new Image(); im.onload = () => resolve(im); im.src = src; });
}

const FILTER_CSS = {
  color: 'contrast(1.12) saturate(1.18) brightness(1.04)',
  gray:  'grayscale(1) contrast(1.15) brightness(1.08)',
  bw:    'grayscale(1) contrast(1.65) brightness(1.18)'
};
const FILTER_LABEL = { color: 'Color', gray: 'Grises', bw: 'B/N' };

// ---------- Perspective warp (4 vértices independientes) ----------
// quad = [TL, TR, BR, BL] each {x,y}. Maps a unit square (0,0)-(1,0)-(1,1)-(0,1)
// onto that quad (classic Heckbert quad-mapping), so we can sample any point
// inside an arbitrary (possibly non-rectangular) quad given normalized u,v.
function computePerspectiveCoeffs(quad){
  const p0=quad[0], p1=quad[1], p2=quad[2], p3=quad[3];
  const dx1=p1.x-p2.x, dx2=p3.x-p2.x, dx3=p0.x-p1.x+p2.x-p3.x;
  const dy1=p1.y-p2.y, dy2=p3.y-p2.y, dy3=p0.y-p1.y+p2.y-p3.y;
  let a11,a12,a13,a21,a22,a23,a31,a32;
  if(Math.abs(dx3) < 1e-9 && Math.abs(dy3) < 1e-9){
    a11=p1.x-p0.x; a12=p2.x-p1.x; a13=p0.x;
    a21=p1.y-p0.y; a22=p2.y-p1.y; a23=p0.y;
    a31=0; a32=0;
  } else {
    const denom = dx1*dy2 - dx2*dy1;
    const g = denom !== 0 ? (dx3*dy2 - dx2*dy3)/denom : 0;
    const h = denom !== 0 ? (dx1*dy3 - dx3*dy1)/denom : 0;
    a11=p1.x-p0.x+g*p1.x; a12=p3.x-p0.x+h*p3.x; a13=p0.x;
    a21=p1.y-p0.y+g*p1.y; a22=p3.y-p0.y+h*p3.y; a23=p0.y;
    a31=g; a32=h;
  }
  return {a11,a12,a13,a21,a22,a23,a31,a32,a33:1};
}
function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }
function quadOutputSize(quad){
  const [tl,tr,br,bl] = quad;
  let w = Math.round((dist(tl,tr)+dist(bl,br))/2);
  let h = Math.round((dist(tl,bl)+dist(tr,br))/2);
  const maxDim = 1700;
  const scale = Math.min(1, maxDim/Math.max(w,h,1));
  w = Math.max(80, Math.round(w*scale));
  h = Math.max(80, Math.round(h*scale));
  return {w,h};
}
function rectToQuad(r){
  return [{x:r.x,y:r.y},{x:r.x+r.w,y:r.y},{x:r.x+r.w,y:r.y+r.h},{x:r.x,y:r.y+r.h}];
}
function warpPerspective(img, quad, outW, outH){
  const srcCanvas = document.createElement('canvas');
  srcCanvas.width = img.width; srcCanvas.height = img.height;
  const sctx = srcCanvas.getContext('2d');
  sctx.drawImage(img, 0, 0);
  const sw = img.width, sh = img.height;
  const srcData = sctx.getImageData(0, 0, sw, sh).data;

  const outCanvas = document.createElement('canvas');
  outCanvas.width = outW; outCanvas.height = outH;
  const octx = outCanvas.getContext('2d');
  const outImageData = octx.createImageData(outW, outH);
  const outData = outImageData.data;

  const c = computePerspectiveCoeffs(quad);

  for(let y=0; y<outH; y++){
    const v = y/outH;
    for(let x=0; x<outW; x++){
      const u = x/outW;
      const denom = c.a31*u + c.a32*v + c.a33;
      let sx = (c.a11*u + c.a12*v + c.a13)/denom;
      let sy = (c.a21*u + c.a22*v + c.a23)/denom;
      sx = Math.max(0, Math.min(sw-1.001, sx));
      sy = Math.max(0, Math.min(sh-1.001, sy));
      const x0=Math.floor(sx), y0=Math.floor(sy), x1=x0+1, y1=y0+1;
      const fx=sx-x0, fy=sy-y0;
      const i00=(y0*sw+x0)*4, i10=(y0*sw+x1)*4, i01=(y1*sw+x0)*4, i11=(y1*sw+x1)*4;
      const outIdx=(y*outW+x)*4;
      for(let k=0;k<3;k++){
        const top = srcData[i00+k]*(1-fx) + srcData[i10+k]*fx;
        const bot = srcData[i01+k]*(1-fx) + srcData[i11+k]*fx;
        outData[outIdx+k] = top*(1-fy) + bot*fy;
      }
      outData[outIdx+3] = 255;
    }
  }
  octx.putImageData(outImageData, 0, 0);
  return outCanvas;
}
async function warpAndFilter(sourceDataUrl, quad, filter){
  const img = await loadImg(sourceDataUrl);
  const q = quad || rectToQuad({x:0,y:0,w:img.width,h:img.height});
  const {w,h} = quadOutputSize(q);
  const warped = warpPerspective(img, q, w, h);
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.filter = FILTER_CSS[filter] || FILTER_CSS.bw;
  ctx.drawImage(warped, 0, 0);
  return canvas.toDataURL('image/jpeg', 0.85);
}

// ---------- Settings sheet ----------
async function openSettingsSheet(){
  const html = `
    <h3>Ajustes de sesión</h3>
    <p class="sub">Definí cómo salen las fotos nuevas por defecto. Siempre podés cambiarlo página por página.</p>
    <div class="sheet-row">
      <div class="sheet-row-label">Fotos nuevas</div>
      <div class="segmented" id="segDefault">
        <button data-df="color">Color</button>
        <button data-df="bw">Blanco y negro</button>
      </div>
    </div>
    <button class="btn-block btn-danger" id="btnResetInSheet">${ICONS.trash} Reiniciar sesión</button>
    <button class="btn-block btn-ghost" id="btnCloseSettings">Cerrar</button>
  `;
  const p = openSheet(html);
  const backdrop = window.__lastSheet;
  const seg = backdrop.querySelector('#segDefault');
  function paintSeg(){
    seg.querySelectorAll('[data-df]').forEach(b => b.classList.toggle('active', b.dataset.df === settings.defaultFilter));
  }
  paintSeg();
  seg.addEventListener('click', (e)=>{
    const b = e.target.closest('[data-df]'); if(!b) return;
    settings.defaultFilter = b.dataset.df; paintSeg(); saveSettings();
  });
  backdrop.querySelector('#btnResetInSheet').addEventListener('click', async ()=>{
    closeSheet();
    await resetSession();
  });
  backdrop.querySelector('#btnCloseSettings').addEventListener('click', closeSheet);
  await p;
}

// ---------- PDF action sheet ----------
async function openPdfSheet(){
  const n = sessionMeta.pageOrder.length;
  const html = `
    <h3>Documento (${n} página${n===1?'':'s'})</h3>
    <p class="sub">Se combinan todas las páginas de la sesión, en el orden en que están, en un solo PDF.</p>
    <button class="btn-block btn-ok" id="btnShareInSheet">${ICONS.share} Compartir PDF</button>
    <button class="btn-block btn-primary" id="btnExportInSheet">${ICONS.download} Descargar PDF</button>
    <button class="btn-block btn-ghost" id="btnCloseSheet">Cancelar</button>
  `;
  const p = openSheet(html);
  const backdrop = window.__lastSheet;
  backdrop.querySelector('#btnExportInSheet').addEventListener('click', async ()=>{ closeSheet(); await exportPdf(); });
  backdrop.querySelector('#btnShareInSheet').addEventListener('click', async ()=>{ closeSheet(); await sharePdf(); });
  backdrop.querySelector('#btnCloseSheet').addEventListener('click', closeSheet);
  await p;
}

// ---------- Crop sheet (4 vértices independientes) ----------
// opts: { mode:'new'|'edit', source, quad (natural px coords or null), filter, pageId }
function openCropModal(opts){
  return new Promise(async (resolveOuter)=>{
    const sourceImg = await loadImg(opts.source);
    let displayW = 0, displayH = 0;
    let points = null; // 4 {x,y} in display px, order TL,TR,BR,BL
    let dragState = null;

    const html = `
      <h3>${opts.mode === 'new' ? 'Ajustar página nueva' : 'Editar página'}</h3>
      <p class="sub">Arrastrá cada vértice al borde del documento — si la foto quedó en ángulo, la app endereza la perspectiva sola. Tocá y arrastrá dentro del recuadro para moverlo entero.</p>
      <div class="crop-stage" id="cropStage">
        <img id="cropImg" src="${opts.source}">
        <svg class="quad-svg"><polygon id="quadPoly" points=""></polygon></svg>
        <div class="quad-handle" data-corner="0" id="h0"></div>
        <div class="quad-handle" data-corner="1" id="h1"></div>
        <div class="quad-handle" data-corner="2" id="h2"></div>
        <div class="quad-handle" data-corner="3" id="h3"></div>
      </div>
      <button class="btn-block btn-ghost" id="cropResetQuad" style="margin-bottom:14px;">Restablecer recorte</button>
      <div class="filter-options" id="cropFilterOptions">
        <button data-f="color">Color</button>
        <button data-f="gray">Grises</button>
        <button data-f="bw">B/N doc.</button>
      </div>
      <button class="btn-block btn-primary" id="cropConfirm">${opts.mode === 'new' ? 'Agregar página' : 'Guardar cambios'}</button>
      ${opts.mode === 'edit' ? `<button class="btn-block btn-danger" id="cropDelete">${ICONS.trash} Eliminar página</button>` : ''}
      <button class="btn-block btn-ghost" id="cropCancel">Cancelar</button>
    `;
    const p = openSheet(html);
    const backdrop = window.__lastSheet;

    let currentFilter = opts.filter || settings.defaultFilter;
    const filterBtns = backdrop.querySelectorAll('#cropFilterOptions [data-f]');
    function updateFilterUI(){ filterBtns.forEach(b => b.classList.toggle('active', b.dataset.f === currentFilter)); }
    filterBtns.forEach(b => b.addEventListener('click', ()=>{ currentFilter = b.dataset.f; updateFilterUI(); }));
    updateFilterUI();

    const cropImgEl = backdrop.querySelector('#cropImg');
    const cropStage = backdrop.querySelector('#cropStage');
    const quadPoly = backdrop.querySelector('#quadPoly');
    const handles = [0,1,2,3].map(i => backdrop.querySelector(`#h${i}`));

    function defaultPoints(){
      const inset = 0.045;
      return [
        { x: displayW*inset, y: displayH*inset },
        { x: displayW*(1-inset), y: displayH*inset },
        { x: displayW*(1-inset), y: displayH*(1-inset) },
        { x: displayW*inset, y: displayH*(1-inset) }
      ];
    }
    function initPoints(){
      displayW = cropImgEl.clientWidth; displayH = cropImgEl.clientHeight;
      const scaleToDisplay = displayW / sourceImg.width;
      points = opts.quad
        ? opts.quad.map(pt => ({ x: pt.x*scaleToDisplay, y: pt.y*scaleToDisplay }))
        : defaultPoints();
      paint();
    }
    function paint(){
      quadPoly.setAttribute('points', points.map(pt => `${pt.x},${pt.y}`).join(' '));
      points.forEach((pt,i) => { handles[i].style.left = pt.x+'px'; handles[i].style.top = pt.y+'px'; });
    }
    function clamp(v,min,max){ return Math.min(Math.max(v,min),max); }
    function stagePoint(e){
      const r = cropStage.getBoundingClientRect();
      const pt = e.touches ? e.touches[0] : e;
      return { x: pt.clientX - r.left, y: pt.clientY - r.top };
    }
    function onPointerDown(e){
      const handle = e.target.closest('.quad-handle');
      const onPoly = e.target.closest('#quadPoly');
      if(!handle && !onPoly) return;
      e.preventDefault();
      const sp = stagePoint(e);
      dragState = handle
        ? { mode:'point', idx: Number(handle.dataset.corner), start:sp, startPoints: points.map(pt=>({...pt})) }
        : { mode:'all', start:sp, startPoints: points.map(pt=>({...pt})) };
    }
    function onPointerMove(e){
      if(!dragState) return;
      e.preventDefault();
      const sp = stagePoint(e);
      const dx = sp.x - dragState.start.x, dy = sp.y - dragState.start.y;
      if(dragState.mode === 'point'){
        const idx = dragState.idx;
        points[idx] = {
          x: clamp(dragState.startPoints[idx].x + dx, 0, displayW),
          y: clamp(dragState.startPoints[idx].y + dy, 0, displayH)
        };
      } else {
        let minDx=-Infinity, maxDx=Infinity, minDy=-Infinity, maxDy=Infinity;
        dragState.startPoints.forEach(pt=>{
          minDx = Math.max(minDx, -pt.x); maxDx = Math.min(maxDx, displayW-pt.x);
          minDy = Math.max(minDy, -pt.y); maxDy = Math.min(maxDy, displayH-pt.y);
        });
        const cdx = clamp(dx, minDx, maxDx), cdy = clamp(dy, minDy, maxDy);
        points = dragState.startPoints.map(pt => ({ x: pt.x+cdx, y: pt.y+cdy }));
      }
      paint();
    }
    function onPointerUp(){ dragState = null; }

    cropStage.addEventListener('pointerdown', onPointerDown);
    document.addEventListener('pointermove', onPointerMove);
    document.addEventListener('pointerup', onPointerUp);

    if(cropImgEl.complete && cropImgEl.naturalWidth) requestAnimationFrame(initPoints);
    else cropImgEl.addEventListener('load', () => requestAnimationFrame(initPoints));

    backdrop.querySelector('#cropResetQuad').addEventListener('click', ()=>{ points = defaultPoints(); paint(); });

    function cleanup(){
      document.removeEventListener('pointermove', onPointerMove);
      document.removeEventListener('pointerup', onPointerUp);
    }
    backdrop.addEventListener('click', (e)=>{ if(e.target === backdrop){ cleanup(); closeSheet(); resolveOuter(null); } });
    backdrop.querySelector('#cropCancel').addEventListener('click', ()=>{ cleanup(); closeSheet(); resolveOuter(null); });
    const delBtn = backdrop.querySelector('#cropDelete');
    if(delBtn) delBtn.addEventListener('click', ()=>{ cleanup(); closeSheet(); resolveOuter({ action:'delete' }); });
    backdrop.querySelector('#cropConfirm').addEventListener('click', ()=>{
      const scaleToNatural = sourceImg.width / displayW;
      const quadNatural = points.map(pt => ({ x: pt.x*scaleToNatural, y: pt.y*scaleToNatural }));
      cleanup(); closeSheet();
      resolveOuter({ action:'confirm', quad: quadNatural, filter: currentFilter });
    });
    await p;
  });
}

// ---------- Core actions ----------
async function startNewCapture(file){
  const img = await fileToImage(file);
  const source = resizeToDataUrl(img, 1600);
  const result = await openCropModal({ mode:'new', source, quad:null, filter: settings.defaultFilter });
  if(!result || result.action !== 'confirm') return;

  showToast('Procesando página…');
  await new Promise(r => setTimeout(r, 30)); // deja pintar el toast antes de la tarea pesada
  const processed = await warpAndFilter(source, result.quad, result.filter);
  const id = (crypto.randomUUID ? crypto.randomUUID() : 'p'+Date.now()+Math.random());
  const page = { id, source, quad: result.quad, filter: result.filter, processed, timestamp: Date.now() };

  if(!sessionMeta.createdAt) sessionMeta.createdAt = Date.now();
  sessionMeta.pageOrder.push(id);
  pagesById[id] = page;
  await savePage(page);
  await saveMeta();
  render(true, id);
}

async function editPage(id){
  const page = pagesById[id];
  if(!page) return;
  const source = page.source || page.original;
  const quad = page.quad || (page.cropRect ? rectToQuad(page.cropRect) : null);
  const result = await openCropModal({ mode:'edit', source, quad, filter: page.filter, pageId: id });
  if(!result) return;
  if(result.action === 'delete'){ await deletePage(id); return; }
  if(result.action === 'confirm'){
    showToast('Actualizando página…');
    await new Promise(r => setTimeout(r, 30));
    page.quad = result.quad;
    delete page.cropRect;
    page.filter = result.filter;
    page.processed = await warpAndFilter(source, result.quad, result.filter);
    await savePage(page);
    render();
  }
}

async function deletePage(id){
  delete pagesById[id];
  sessionMeta.pageOrder = sessionMeta.pageOrder.filter(x => x !== id);
  await deletePageStorage(id);
  await saveMeta();
  render();
}
async function movePage(id, dir){
  const order = sessionMeta.pageOrder;
  const idx = order.indexOf(id);
  const swapWith = idx + dir;
  if(swapWith < 0 || swapWith >= order.length) return;
  [order[idx], order[swapWith]] = [order[swapWith], order[idx]];
  await saveMeta();
  render();
}
async function resetSession(){
  if(!confirm('¿Borrar todas las páginas de esta sesión? Esta acción no se puede deshacer.')) return;
  for(const id of sessionMeta.pageOrder) await deletePageStorage(id);
  sessionMeta = { createdAt: null, pageOrder: [] };
  pagesById = {};
  await saveMeta();
  render();
  showToast('Sesión reiniciada.');
}

// ---------- PDF ----------
async function buildPdfBlob(){
  const pdf = new jsPDF({ unit:'pt', format:'a4' });
  const pageW = pdf.internal.pageSize.getWidth();
  const pageH = pdf.internal.pageSize.getHeight();
  const margin = 24;
  for(let i=0; i<sessionMeta.pageOrder.length; i++){
    const page = pagesById[sessionMeta.pageOrder[i]];
    if(i>0) pdf.addPage();
    const img = await loadImg(page.processed);
    const availW = pageW - margin*2, availH = pageH - margin*2;
    const scale = Math.min(availW/img.width, availH/img.height);
    const w = img.width*scale, h = img.height*scale;
    const x = (pageW-w)/2, y = (pageH-h)/2;
    pdf.addImage(page.processed, 'JPEG', x, y, w, h);
  }
  return pdf.output('blob');
}
async function exportPdf(){
  if(sessionMeta.pageOrder.length === 0) return;
  showToast('Generando PDF…');
  const blob = await buildPdfBlob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `documento-escaneado-${new Date().toISOString().slice(0,10)}.pdf`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=> URL.revokeObjectURL(url), 5000);
}
async function sharePdf(){
  if(sessionMeta.pageOrder.length === 0) return;
  showToast('Preparando para compartir…');
  const blob = await buildPdfBlob();
  const file = new File([blob], `documento-escaneado-${new Date().toISOString().slice(0,10)}.pdf`, { type:'application/pdf' });
  try{
    if(navigator.canShare && navigator.canShare({ files:[file] })){
      await navigator.share({ files:[file], title:'Documento escaneado' });
      return;
    }
  }catch(e){ /* fall through */ }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = file.name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=> URL.revokeObjectURL(url), 5000);
  showToast('Tu navegador no admite compartir directo: se descargó el PDF.');
}

// ---------- Rendering ----------
function fmtElapsed(ms){
  const mins = Math.floor(ms/60000);
  if(mins < 1) return 'recién empezó';
  if(mins < 60) return `hace ${mins} min`;
  const hrs = Math.floor(mins/60), remMins = mins%60;
  return `hace ${hrs} h ${remMins} min`;
}
function updateStatus(){
  const n = sessionMeta.pageOrder.length;
  statusText.textContent = n === 0 ? 'Sin páginas' : `${n} página${n===1?'':'s'} · ${fmtElapsed(Date.now()-sessionMeta.createdAt)}`;
  pageBadge.textContent = n;
  pageBadge.style.display = n === 0 ? 'none' : 'flex';
}

function render(justAdded, newId){
  const n = sessionMeta.pageOrder.length;
  emptyState.style.display = n === 0 ? 'block' : 'none';
  grid.innerHTML = '';

  sessionMeta.pageOrder.forEach((id, i) => {
    const page = pagesById[id];
    if(!page) return;
    const card = document.createElement('div');
    card.className = 'page-card';
    card.style.animationDelay = (i * 0.03) + 's';
    const time = new Date(page.timestamp).toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'});
    card.innerHTML = `
      <div class="thumb-wrap">
        <img src="${page.processed}" data-id="${id}" class="thumb-img">
        <div class="thumb-scrim"></div>
        <span class="page-num">${i+1} / ${n}</span>
        <button class="del-btn" data-del="${id}">${ICONS.close}</button>
        <div class="card-footer">
          <span class="filter-chip">${FILTER_LABEL[page.filter]} · ${time}</span>
          <div class="move-btns">
            <button data-up="${id}" ${i===0?'disabled':''}>${ICONS.up}</button>
            <button data-down="${id}" ${i===n-1?'disabled':''}>${ICONS.down}</button>
          </div>
        </div>
        ${justAdded && id === newId ? '<div class="scan-sweep"></div>' : ''}
      </div>
    `;
    grid.appendChild(card);
  });

  grid.querySelectorAll('.thumb-img').forEach(el => el.addEventListener('click', ()=> editPage(el.dataset.id)));
  grid.querySelectorAll('[data-del]').forEach(el => el.addEventListener('click', (e)=>{ e.stopPropagation(); deletePage(el.dataset.del); }));
  grid.querySelectorAll('[data-up]').forEach(el => el.addEventListener('click', (e)=>{ e.stopPropagation(); movePage(el.dataset.up, -1); }));
  grid.querySelectorAll('[data-down]').forEach(el => el.addEventListener('click', (e)=>{ e.stopPropagation(); movePage(el.dataset.down, 1); }));

  updateStatus();
}

// ---------- Input wiring ----------
$('btnCamera').addEventListener('click', ()=> $('fileInputCamera').click());
$('btnGallery').addEventListener('click', ()=> $('fileInputGallery').click());
$('btnMenu').addEventListener('click', openSettingsSheet);
$('btnPdfMenu').addEventListener('click', openPdfSheet);

async function handleFiles(fileList){
  const files = Array.from(fileList || []);
  for(const file of files){
    if(!file.type.startsWith('image/')) continue;
    await startNewCapture(file);
  }
}
$('fileInputCamera').addEventListener('change', (e)=>{ handleFiles(e.target.files); e.target.value=''; });
$('fileInputGallery').addEventListener('change', (e)=>{ handleFiles(e.target.files); e.target.value=''; });

setInterval(updateStatus, 60000);
loadSettings().then(loadSession);
</script>
